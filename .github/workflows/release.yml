name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Package web + extensions
        run: |
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ZotIt ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/web-dist.zip
            artifacts/chrome-dist.zip
            artifacts/firefox-dist.zip
